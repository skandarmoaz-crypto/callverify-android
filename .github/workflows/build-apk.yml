name: Build CallVerify APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk CallVerify.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CallVerify-apk
          path: CallVerify.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: CallVerify APK (build ${{ github.run_number }})
          body: "تحميل تلقائي — بناء رقم ${{ github.run_number }} | Automatic build #${{ github.run_number }}"
          files: CallVerify.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
